<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Admin — {{ shop.name }}{% endblock %}</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<div class="admin-shell">
  <aside class="admin-sidebar">
    <div class="admin-sidebar-brand">
      <span class="brand-mark" style="width:38px; height:38px; font-size:1.1rem;">A<span class="brand-mark-z">Z</span></span>
      <span class="brand-name" style="font-size:0.92rem;">Admin Panel</span>
    </div>

    <a href="{{ url_for('admin_dashboard') }}" class="admin-nav-link {{ 'active' if request.endpoint == 'admin_dashboard' }}">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>
      Dashboard
    </a>
    <a href="{{ url_for('admin_products') }}" class="admin-nav-link {{ 'active' if request.endpoint == 'admin_products' }}">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="7" y="2" width="10" height="20" rx="2"/><line x1="11" y1="18" x2="13" y2="18"/></svg>
      Products
    </a>
    <a href="{{ url_for('admin_repairs') }}" class="admin-nav-link {{ 'active' if request.endpoint == 'admin_repairs' }}">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>
      Repairs
    </a>
    <a href="{{ url_for('admin_reviews') }}" class="admin-nav-link {{ 'active' if request.endpoint == 'admin_reviews' }}">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
      Reviews
    </a>
    <a href="{{ url_for('admin_enquiries') }}" class="admin-nav-link {{ 'active' if request.endpoint == 'admin_enquiries' }}">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      Enquiries
    </a>

    <div class="admin-sidebar-foot">
      <a href="{{ url_for('home') }}" class="admin-nav-link">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
        View Website
      </a>
      <a href="{{ url_for('admin_logout') }}" class="admin-nav-link" style="color:#E08C7A;">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Logout
      </a>
    </div>
  </aside>

  <div class="admin-main">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <div style="display:flex; flex-direction:column; gap:8px; margin-bottom:24px;">
        {% for category, message in messages %}
          <div class="flash flash-{{ category }}">
            <span>{{ message }}</span>
            <button class="flash-close" onclick="this.parentElement.remove()">&times;</button>
          </div>
        {% endfor %}
        </div>
      {% endif %}
    {% endwith %}

    {% block admin_content %}{% endblock %}
  </div>
</div>

<script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
